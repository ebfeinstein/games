<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAD's Games</title>
  <style>
    :root {
      --bg: #dbeafe;
      --panel: #f0f7ff;
      --border: #bfdbfe;
      --text: #1e3a5f;
      --muted: #4a7aab;
      --accent: #1d6fa4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 3rem;
      font-size: 1rem;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 780px;
    }

    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 2rem 1.5rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, transform 0.15s;
    }

    a.card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    .icon {
      font-size: 2.5rem;
      line-height: 1;
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: 600;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>DAD's Games</h1>
  <p class="subtitle">Pick a game to play</p>

  <div class="games">
    <a class="card" href="hangman.html">
      <span class="icon">🪢</span>
      <span class="card-title">Hangman</span>
      <span class="card-desc">Guess the hidden word one letter at a time before the hangman is complete</span>
    </a>
    <a class="card" href="tictactoe.html">
      <span class="icon">⭕</span>
      <span class="card-title">Tic-Tac-Toe</span>
      <span class="card-desc">Classic 3×3 grid game — Player vs Player or vs unbeatable AI</span>
    </a>
    <a class="card" href="tictactoe3d.html">
      <span class="icon">🎲</span>
      <span class="card-title">3D Tic-Tac-Toe</span>
      <span class="card-desc">Four-in-a-row on a 4×4×4 cube — 76 winning lines in every direction</span>
    </a>
  </div>
</body>
</html>
