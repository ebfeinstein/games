<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.8rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.6rem 1.4rem;
      border-radius: 10px;
    }

    .score-box span {
      display: block;
      font-size: 1.6rem;
      font-weight: 700;
    }

    .score-box.x-score span { color: #e94560; }
    .score-box.o-score span { color: #a8dadc; }
    .score-box.draw-score span { color: #aaa; }

    #reset {
      margin-top: 1.8rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
    }

    #reset:hover { background: #c73652; }

    #mode-toggle {
      margin-top: 0.8rem;
      padding: 0.5rem 1.6rem;
      font-size: 0.9rem;
      background: #0f3460;
      color: #a8dadc;
      border: 1px solid #a8dadc44;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #mode-toggle:hover { background: #1a4a7a; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="status">Player X's turn</div>
  <div id="board"></div>
  <div id="score">
    <div class="score-box x-score">X <span id="score-x">0</span></div>
    <div class="score-box draw-score">Draws <span id="score-d">0</span></div>
    <div class="score-box o-score">O <span id="score-o">0</span></div>
  </div>
  <button id="reset">New Game</button>
  <button id="mode-toggle">vs Computer: OFF</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, gameOver, vsComputer;
    let scores = { X: 0, O: 0, D: 0 };

    const boardEl   = document.getElementById('board');
    const statusEl  = document.getElementById('status');
    const resetBtn  = document.getElementById('reset');
    const modeBtn   = document.getElementById('mode-toggle');

    vsComputer = false;

    function init() {
      board    = Array(9).fill('');
      current  = 'X';
      gameOver = false;
      statusEl.textContent = "Player X's turn";
      render();
    }

    function render() {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        cell.textContent = val;
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      if (vsComputer && current === 'O') return;
      place(i);
    }

    function place(i) {
      board[i] = current;
      render();

      const win = checkWin(current);
      if (win) {
        highlight(win);
        statusEl.textContent = (vsComputer && current === 'O') ? 'Computer wins!' : `Player ${current} wins!`;
        scores[current]++;
        updateScore();
        gameOver = true;
        return;
      }
      if (board.every(Boolean)) {
        statusEl.textContent = "It's a draw!";
        scores.D++;
        updateScore();
        gameOver = true;
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      if (vsComputer && current === 'O') {
        statusEl.textContent = "Computer is thinking...";
        setTimeout(computerMove, 400);
      } else {
        statusEl.textContent = `Player ${current}'s turn`;
      }
    }

    function checkWin(player) {
      return WINS.find(line => line.every(i => board[i] === player)) || null;
    }

    function highlight(line) {
      const cells = boardEl.querySelectorAll('.cell');
      line.forEach(i => cells[i].classList.add('win'));
    }

    function updateScore() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-d').textContent = scores.D;
    }

    // Minimax AI
    function computerMove() {
      const best = minimax(board, 'O', 0);
      place(best.index);
    }

    function minimax(b, player, depth) {
      const opponent = player === 'O' ? 'X' : 'O';

      if (WINS.some(line => line.every(i => b[i] === 'O'))) return { score:  10 - depth };
      if (WINS.some(line => line.every(i => b[i] === 'X'))) return { score: -10 + depth };
      const empty = b.reduce((acc, v, i) => v === '' ? [...acc, i] : acc, []);
      if (!empty.length) return { score: 0 };

      const moves = empty.map(i => {
        const nb = [...b];
        nb[i] = player;
        return { index: i, score: minimax(nb, opponent, depth + 1).score };
      });

      return moves.reduce((best, m) =>
        player === 'O' ? (m.score > best.score ? m : best)
                       : (m.score < best.score ? m : best)
      );
    }

    resetBtn.addEventListener('click', init);

    modeBtn.addEventListener('click', () => {
      vsComputer = !vsComputer;
      modeBtn.textContent = `vs Computer: ${vsComputer ? 'ON' : 'OFF'}`;
      init();
    });

    init();
  </script>
</body>
</html>
